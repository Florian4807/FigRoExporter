<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FigRoExporter - Roblox Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        h1 span { color: #6c5ce7; }
        .subtitle { color: #888; margin-bottom: 30px; }
        
        .btn {
            display: block;
            width: 100%;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary {
            background: #6c5ce7;
            color: white;
        }
        .btn-primary:hover { background: #7d6ff0; }
        
        .input-group { margin: 20px 0; text-align: left; }
        .input-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 14px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #6c5ce7;
        }
        
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        .status.loading { display: block; background: rgba(84,160,255,0.2); color: #54a0ff; }
        .status.success { display: block; background: rgba(0,214,143,0.2); color: #00d68f; }
        .status.error { display: block; background: rgba(255,107,107,0.2); color: #ff6b6b; }
        
        .note {
            margin-top: 20px;
            font-size: 11px;
            color: #555;
        }
        
        .step { margin: 8px 0; font-size: 13px; color: #aaa; }
        .step strong { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fig<span>Ro</span>Exporter</h1>
        <p class="subtitle">Connect your Roblox account</p>
        
        <div id="loginStep">
            <p class="step">1. Enter your <strong>API Secret</strong> from Roblox Developer Hub</p>
            <p class="step">2. Click <strong>Connect Roblox</strong></p>
            <p class="step">3. Authorize in the popup</p>
            
            <div class="input-group">
                <label>API Secret</label>
                <input type="password" id="clientSecret" placeholder="RBX-xxxxxxxxxxxxxxxxx" />
            </div>
            
            <button class="btn btn-primary" id="connectBtn">Connect Roblox</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <p class="note">
            Your secret is only used to exchange the OAuth code.<br>
            The access token is stored locally in your browser.
        </p>
    </div>

    <script>
        const CLIENT_ID = '6051993114266710234';
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        
        const status = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const clientSecretInput = document.getElementById('clientSecret');
        const loginStep = document.getElementById('loginStep');
        
        // Check for OAuth callback
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        
        if (code) {
            // OAuth callback - exchange code for token
            loginStep.style.display = 'none';
            status.className = 'status loading';
            status.textContent = 'Exchanging code for access token...';
            
            // Get secret from sessionStorage (set before redirect)
            const secret = sessionStorage.getItem('roblox_secret');
            if (!secret) {
                status.className = 'status error';
                status.textContent = 'Session expired. Please start over.';
            } else {
                exchangeCodeForToken(code, secret);
            }
        } else if (error) {
            status.className = 'status error';
            status.textContent = 'Authorization denied: ' + error;
        }
        
        connectBtn.addEventListener('click', async () => {
            const secret = clientSecretInput.value.trim();
            if (!secret) {
                alert('Please enter your API Secret');
                return;
            }
            
            // Save secret temporarily (cleared after use)
            sessionStorage.setItem('roblox_secret', secret);
            
            // Build OAuth URL
            const state = Math.random().toString(36).substring(2);
            sessionStorage.setItem('oauth_state', state);
            
            const authUrl = 'https://apis.roblox.com/oauth/v1/authorize?' + 
                'client_id=' + CLIENT_ID +
                '&response_type=code' +
                '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
                '&scope=openid profile asset:write' +
                '&state=' + state;
            
            // Open OAuth in popup
            const popup = window.open(authUrl, 'roblox_oauth', 'width=600,height=700');
            
            // Poll for result from localStorage (set by redirect page)
            pollForToken(popup);
        });
        
        async function exchangeCodeForToken(code, secret) {
            try {
                const response = await fetch('https://apis.roblox.com/oauth/v1/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: CLIENT_ID,
                        client_secret: secret,
                        code: code,
                        redirect_uri: REDIRECT_URI
                    })
                });
                
                const data = await response.json();
                
                if (data.access_token) {
                    // Store token in localStorage
                    localStorage.setItem('roblox_access_token', data.access_token);
                    localStorage.setItem('roblox_token_type', data.token_type || 'Bearer');
                    
                    // Get user info
                    const userRes = await fetch('https://users.roblox.com/v1/user', {
                        headers: { 'Authorization': `Bearer ${data.access_token}` }
                    });
                    const userData = await userRes.json();
                    
                    localStorage.setItem('roblox_user_id', userData.id);
                    localStorage.setItem('roblox_username', userData.name);
                    localStorage.setItem('roblox_displayname', userData.displayName);
                    
                    status.className = 'status success';
                    status.innerHTML = `
                        ✓ Connected successfully!<br>
                        <strong>${userData.displayName || userData.name}</strong><br>
                        <small>You can close this window now.</small>
                    `;
                    
                    // Notify opener
                    window.opener?.postMessage({
                        type: 'roblox_auth_complete',
                        userId: userData.id,
                        username: userData.name,
                        displayName: userData.displayName,
                        token: data.access_token
                    }, '*');
                } else {
                    throw new Error(data.error_description || 'Failed to get token');
                }
            } catch (err) {
                status.className = 'status error';
                status.textContent = 'Error: ' + err.message;
            }
        }
        
        function pollForToken(popup) {
            const pollInterval = setInterval(() => {
                // Check localStorage for token (set by redirect page)
                const token = localStorage.getItem('roblox_access_token');
                if (token && popup) {
                    clearInterval(pollInterval);
                    popup.close();
                    
                    status.className = 'status success';
                    status.innerHTML = `
                        ✓ Connected!<br>
                        <small>You can close this window now.</small>
                    `;
                }
                
                // Check if popup is closed
                if (popup && popup.closed) {
                    clearInterval(pollInterval);
                    status.className = 'status loading';
                    status.textContent = 'Waiting for authorization...';
                }
            }, 500);
        }
    </script>
</body>
</html>
